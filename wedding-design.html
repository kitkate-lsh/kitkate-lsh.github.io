<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дизайн приглашения — Артём & Екатерина</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Great+Vibes&family=Montserrat:wght@300;400;500&family=Marck+Script&display=swap" rel="stylesheet">
    <!-- Библиотека html2pdf для создания PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F5F0EB;
            font-family: 'Montserrat', sans-serif;
            color: #3a3a3a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .invitation-card {
            max-width: 550px;
            width: 100%;
            background: #FAF7F2;
            padding: 50px 40px;
            border: 1px solid #D8CFC3;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
        }

        .invitation-card::before,
        .invitation-card::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            border: 1px solid #C0B090;
        }

        .invitation-card::before {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
        }

        .invitation-card::after {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
        }

        .corner-top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border: 1px solid #C0B090;
            border-left: none;
            border-bottom: none;
        }

        .corner-bottom-left {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border: 1px solid #C0B090;
            border-right: none;
            border-top: none;
        }

        .greeting {
            font-size: 14px;
            letter-spacing: 3px;
            color: #8C7A6B;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .invite-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            color: #4a4a4a;
            line-height: 1.6;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 48px;
            color: #6B5B4E;
            margin: 20px 0 10px;
        }

        .date {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 300;
            color: #8C7A6B;
            letter-spacing: 2px;
            margin: 15px 0 30px;
        }

        .two-columns {
            display: flex;
            justify-content: space-between;
            margin: 30px 0 20px;
            border-top: 1px solid #D8CFC3;
            border-bottom: 1px solid #D8CFC3;
            padding: 20px 0;
        }

        .column {
            flex: 1;
            text-align: center;
        }

        .column-title {
            font-size: 12px;
            letter-spacing: 2px;
            color: #8C7A6B;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .column-time {
            font-size: 24px;
            font-weight: 300;
            color: #2c2c2c;
            margin-bottom: 15px;
        }

        .column-place {
            font-size: 13px;
            color: #777;
            line-height: 1.5;
        }

        .divider-vertical {
            width: 1px;
            background: #D8CFC3;
            margin: 0 20px;
        }

        .signature {
            margin-top: 30px;
            font-size: 12px;
            letter-spacing: 2px;
            color: #9a8b7a;
            text-transform: uppercase;
        }

        .signature-names {
            font-family: 'Great Vibes', cursive;
            font-size: 28px;
            color: #6B5B4E;
            margin-top: 8px;
        }

        @media (max-width: 550px) {
            .invitation-card {
                padding: 40px 25px;
            }
            .names {
                font-size: 36px;
            }
            .column-time {
                font-size: 20px;
            }
            .two-columns {
                flex-direction: column;
                gap: 25px;
            }
            .divider-vertical {
                display: none;
            }
        }

        /* Кнопка скачивания PDF */
        .pdf-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #8C7A6B;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pdf-btn:hover {
            background: #6B5B4E;
            transform: scale(1.05);
        }

        @media print {
            .pdf-btn {
                display: none;
            }
            body {
                background: white;
                padding: 0;
            }
            .invitation-card {
                box-shadow: none;
                border: none;
            }
        }
    </style>
</head>
<body>
    <div class="invitation-card" id="invitationContent">
        <div class="corner-top-right"></div>
        <div class="corner-bottom-left"></div>
        
        <div class="greeting">Дорогие ребята и друзья!</div>
        
        <div class="invite-text">
            ПРИГЛАШАЕМ ВАС НА ТОРЖЕСТВО,<br>
            ПОСВЯЩЕННОЕ ДНЮ НАШЕГО БРАКОСОЧЕТАНИЯ
        </div>
        
        <div class="names">
            Артём<br>
            <span style="font-size: 32px;">&</span><br>
            Екатерина
        </div>
        
        <div class="date">7 АВГУСТА 2026</div>
        
        <div class="two-columns">
            <div class="column">
                <div class="column-title">БРАКОСОЧЕТАНИЕ</div>
                <div class="column-time">13:40</div>
                <div class="column-place">
                    ЗАГС<br>
                    ул. Олеко Дундича, 23
                </div>
            </div>
            
            <div class="divider-vertical"></div>
            
            <div class="column">
                <div class="column-title">БАНКЕТ</div>
        
                <div class="column-time" style="font-size: 24px; margin-top: 5px;">17:00</div>
              <div class="column-place">
                    Сбор гостей в 16:20
                </div>
                <div class="column-place">
                    Ресторан "НАБЕРЕЖНАЯ №1"<br>
                    ул. Острогожская, 155Б
                </div>
            </div>
        </div>
        
        <div class="signature">
            С ЛЮБОВЬЮ,
        </div>
        <div class="signature-names">
            Артём & Екатерина
        </div>
    </div>

    <button class="pdf-btn" id="downloadPDF" title="Скачать PDF">📄</button>

    <script>
        // Функция скачивания PDF
        function downloadPDF() {
            const element = document.getElementById('invitationContent');
            
            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: 'priglashenie_Artem_Ekaterina_2026.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2.5,
                    useCORS: true,
                    letterRendering: true,
                    logging: false
                },
                jsPDF: { 
                    unit: 'mm', 
                    format: 'a4', 
                    orientation: 'portrait',
                    compress: true
                }
            };

            html2pdf().set(opt).from(element).save();
        }

        document.getElementById('downloadPDF').addEventListener('click', downloadPDF);
    </script>
</body>
</html>
